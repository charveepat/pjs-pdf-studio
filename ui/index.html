<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>PJS Pdf Studio</title>
<style>
  @font-face{
    font-family:'Playfair Display';
    font-weight:900;
    font-display:swap;
    src:url('fonts/PlayfairDisplay-Black.ttf') format('truetype');
  }
  :root{
    --paper:#DCD3B9; --panel:#FFFCF3; --cabinet:#F1E9D3; --line:#E1D6B8;
    --ink:#211D12; --ink-soft:#6C6247; --ink-faint:#9D9376;
    --accent:#0B4A85; --accent-ink:#063A69; --accent-tint:#E7EDF4;
    --gold:#B8901E; --brand-green:#4C9A3B; --brand-green-tint:#E7F0E1;
    --good:#1F8A5F; --good-tint:#E4F4EC;
    --warn:#9C6B2E; --warn-tint:#F1E9D6;
    --w-color:#2F5C94; --w-tint:#E7EDF6;
    --x-color:#2E8659; --x-tint:#E4F3EA;
    --p-color:#C56A2E; --p-tint:#F6E9DD;
    --img-color:#64707B; --img-tint:#E9ECEE;
    --pdf-color:#B33B3E; --pdf-tint:#F7E7E7;
    --font-ui:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --font-mono:"Cascadia Code","Cascadia Mono",Consolas,"SF Mono",ui-monospace,monospace;
    --font-title:'Playfair Display',Cambria,Georgia,"Times New Roman",serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#141108; --panel:#1E1A10; --cabinet:#181407; --line:#332C1B;
      --ink:#F0EAD6; --ink-soft:#B7AC8C; --ink-faint:#79705A;
      --accent:#6FA8DE; --accent-ink:#8FBCE8; --accent-tint:#1B2531;
      --gold:#D9B65C; --brand-green:#6FBE5C; --brand-green-tint:#182518;
      --good:#4FBF8C; --good-tint:#16261F;
      --warn:#D8B45E; --warn-tint:#332A17;
      --w-color:#82A6D6; --w-tint:#1E2733;
      --x-color:#6FBE93; --x-tint:#1B2A22;
      --p-color:#DA9A64; --p-tint:#332721;
      --img-color:#9AA6B0; --img-tint:#232A31;
      --pdf-color:#DC7275; --pdf-tint:#332222;
    }
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0; font-family:var(--font-ui); color:var(--ink); background:var(--paper);
    display:flex; flex-direction:column; overflow:hidden;
  }
  button, input{ font-family:inherit; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }

  .banner{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:16px;
    padding:14px 26px; background:var(--panel); border-bottom:1px solid var(--line); flex:none;
  }
  .banner-logo{ height:48px; width:auto; display:block; justify-self:start; }
  .wordmark{ justify-self:center; text-align:center; }
  .wm-stack{
    position:relative; margin:0 auto;
    width:clamp(210px, 19vw, 340px); height:clamp(64px, 5.8vw, 104px);
  }
  .wm-stack span{
    position:absolute; font-family:var(--font-title); font-weight:900; color:var(--ink);
    line-height:1; letter-spacing:.01em; font-size:clamp(34px, 3.1vw, 55px);
  }
  .wm-stack .w-pjs{ top:0%; left:3%; }
  .wm-stack .w-pdf{ top:37%; left:31%; color:var(--accent); }
  .wordmark .w1{
    margin-top:clamp(4px, 0.5vw, 9px); font-family:var(--font-mono); font-weight:700;
    font-size:clamp(11px, 1vw, 17px); text-transform:uppercase;
    letter-spacing:.42em; color:var(--ink); text-indent:.42em; display:block;
  }
  .wordmark .w2{
    margin-top:clamp(3px, 0.4vw, 7px); font-size:clamp(9.5px, 0.85vw, 14px); font-weight:600;
    letter-spacing:.28em; text-indent:.28em; text-transform:uppercase; color:var(--accent); display:block;
  }
  .seal{
    justify-self:end; flex:none; width:64px; height:64px; border-radius:50%; border:2px solid var(--accent);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-6deg); background:var(--panel);
  }
  .seal svg{ width:13px; height:13px; margin-bottom:1px; }
  .seal .s-big{ font-size:11px; font-weight:800; color:var(--accent); }
  .seal .s-small{ font-family:var(--font-mono); font-size:6px; letter-spacing:.07em; color:var(--ink-faint); margin-top:1px; text-align:center; }

  .toolbar{ flex:none; display:flex; align-items:center; gap:10px; padding:9px 26px; background:var(--panel); border-bottom:1px solid var(--line); }
  .search{ flex:1; max-width:340px; display:flex; align-items:center; gap:7px; background:var(--cabinet); border:1px solid var(--line); border-radius:6px; padding:6px 10px; color:var(--ink-faint); font-size:12.5px; }
  .search svg{ width:13px; height:13px; flex:none; }
  .search input{ border:0; background:none; outline:none; flex:1; font-size:12.5px; color:var(--ink); min-width:0; }
  .toolbar-status{ margin-left:auto; display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:11px; color:var(--good); }
  .toolbar-status .dot{ width:6px;height:6px;border-radius:50%;background:var(--good); box-shadow:0 0 0 3px color-mix(in srgb, var(--good) 22%, transparent); }

  .filterbar{
    display:flex; align-items:center; justify-content:center; gap:clamp(8px, 0.9vw, 16px);
    flex-wrap:wrap; padding:clamp(12px, 1.3vw, 22px) 26px;
    background:var(--brand-green); border-bottom:1px solid color-mix(in srgb, var(--brand-green) 60%, black 15%); flex:none;
  }
  .pill{
    border:1px solid var(--line); background:var(--panel); color:var(--ink-soft); border-radius:999px;
    padding:clamp(6px, 0.6vw, 11px) clamp(14px, 1.3vw, 22px); font-size:clamp(12px, 1.05vw, 16px); font-weight:600;
    cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .pill:hover{ border-color:var(--accent); color:var(--ink); }
  .pill.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .pill-count{ font-family:var(--font-mono); font-size:clamp(10px, 0.85vw, 13px); opacity:.75; }

  .canvas{ flex:1; overflow-y:auto; }
  .canvas-inner{ max-width:1500px; margin:0 auto; padding:22px 24px 40px; }

  .dropzone{ border:1.5px dashed var(--line); border-radius:10px; padding:18px 20px; display:flex; align-items:center; gap:14px; margin-bottom:22px; cursor:pointer; background:color-mix(in srgb, var(--cabinet) 35%, transparent); transition:border-color .15s ease, background .15s ease; }
  .dropzone:hover, .dropzone.drag{ border-color:var(--accent); background:var(--accent-tint); }
  .dropzone svg{ width:26px;height:26px;color:var(--ink-faint); flex:none; }
  .dropzone .dz-title{ font-size:13px; font-weight:600; }
  .dropzone .dz-sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:10px; }
  .card{ text-align:left; background:var(--panel); border:1.5px solid var(--line); border-radius:9px; padding:13px; cursor:pointer; display:flex; flex-direction:column; gap:9px; transition:transform .12s ease, border-color .12s ease, border-width .12s ease, box-shadow .12s ease; }
  .card:hover, .card:focus-visible{ transform:translateY(-2px); border-width:2px; border-color:var(--accent); box-shadow:0 8px 18px -12px rgba(0,0,0,.35); outline:none; }
  .card-icon{ position:relative; width:38px;height:38px;border-radius:8px; display:flex;align-items:center;justify-content:center; }
  .card-icon svg{ width:20px;height:20px; }
  .badge{
    position:absolute; bottom:-4px; right:-4px; min-width:17px; height:17px; padding:0 3px;
    border-radius:5px; display:flex; align-items:center; justify-content:center;
    border:2px solid var(--panel); font-family:var(--font-mono); font-size:7px; font-weight:800;
  }
  .card h3{ margin:0; font-size:13.5px; font-weight:700; }
  .card p{ margin:0; font-size:11.8px; color:var(--ink-soft); line-height:1.4; }
  .card-meta{ margin-top:auto; display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); }
  .card-meta .dot{ width:5px;height:5px;border-radius:50%;background:var(--good); }

  .workflow{ display:none; }
  .workflow.show{ display:block; }
  .home.hide{ display:none; }

  .back{ display:inline-flex; align-items:center; gap:6px; border:0; background:none; cursor:pointer; color:var(--ink-soft); font-size:12px; padding:4px 0; margin-bottom:14px; }
  .back:hover{ color:var(--ink); }
  .back svg{ width:13px;height:13px; }

  .wf-head{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
  .wf-head .card-icon{ width:42px; height:42px; }
  .wf-head h1{ font-size:17px; margin:0 0 2px; }
  .wf-head .crumb{ font-size:11.5px; color:var(--ink-faint); }

  .filecard{ display:flex; align-items:center; gap:12px; border:1px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:12px; background:var(--panel); }
  .filecard .card-icon{ width:36px;height:36px; }
  .filecard .fname{ font-size:13px; font-weight:600; }
  .filecard .fsize{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); }
  .filecard button.clear{ margin-left:auto; border:0; background:none; color:var(--ink-faint); cursor:pointer; font-size:11.5px; }
  .filecard button.clear:hover{ color:var(--accent); }

  .panel-box{ border:1px solid var(--line); border-radius:9px; padding:16px; margin-bottom:16px; background:var(--panel); }
  .panel-box h4{ margin:0 0 12px; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); }

  .segmented{ display:flex; gap:8px; margin-bottom:6px; }
  .seg{ flex:1; border:1px solid var(--line); background:var(--cabinet); border-radius:7px; padding:10px 8px; cursor:pointer; text-align:center; }
  .seg .t1{ font-size:12.5px; font-weight:700; }
  .seg .t2{ font-size:10.5px; color:var(--ink-faint); margin-top:2px; }
  .seg.active{ background:var(--accent-tint); border-color:var(--accent); }
  .seg.active .t1{ color:var(--accent-ink); }

  .compare{ display:flex; align-items:center; gap:14px; margin-top:14px; }
  .compare .side{ flex:1; }
  .compare .label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); margin-bottom:5px;}
  .compare .num{ font-family:var(--font-mono); font-size:19px; font-weight:600; font-variant-numeric:tabular-nums; }
  .compare .side.after .num{ color:var(--good); }
  .compare .arrow svg{ width:18px;height:18px; color:var(--ink-faint); }
  .reduction{ margin-top:10px; text-align:center; font-size:12px; color:var(--good); font-weight:600; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .field input[type=text], .field input[type=password]{ width:100%; border:1px solid var(--line); background:var(--cabinet); border-radius:6px; padding:9px 10px; font-size:12.5px; color:var(--ink); }
  .field input:focus{ outline:none; border-color:var(--accent); }
  .field .hint{ font-size:11px; color:var(--ink-faint); margin-top:5px; }
  .pwrow{ display:flex; align-items:center; gap:8px; }
  .pwrow input{ flex:1; }
  .pw-toggle{ border:0; background:none; color:var(--accent); font-size:11px; font-weight:700; cursor:pointer; padding:4px; flex:none; }

  .checkrow{ display:flex; align-items:center; gap:9px; font-size:12.5px; margin-bottom:7px; cursor:pointer; }
  .checkrow input{ width:15px;height:15px; accent-color:var(--accent); flex:none; }
  .hintmono{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); margin-left:2px; }

  .matchlist{ margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .matchrow{ display:flex; align-items:center; gap:9px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; background:var(--cabinet); font-size:12px; }
  .matchrow input{ width:15px;height:15px; accent-color:var(--accent); flex:none; }
  .matchrow .m-label{ font-weight:600; flex:1; }
  .matchrow .m-sample{ font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); }
  .matchrow .m-page{ font-family:var(--font-mono); font-size:10px; color:var(--ink-faint); background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:2px 6px; flex:none; }

  .pagestrip{ display:flex; gap:8px; flex-wrap:wrap; }
  .pagechip{ position:relative; width:64px; border:1px solid var(--line); background:var(--cabinet); border-radius:6px; padding:4px; cursor:pointer; text-align:center; overflow:hidden; }
  .pagechip:hover{ border-color:var(--accent); }
  .pagechip.active{ border-color:var(--accent); background:var(--accent-tint); }
  .pagechip img{ width:100%; display:block; border-radius:3px; }
  .pagechip span{ display:block; font-size:9.5px; color:var(--ink-faint); font-family:var(--font-mono); margin-top:3px; }
  .pagechip-dot{ position:absolute; top:5px; right:5px; width:7px; height:7px; border-radius:50%; background:var(--accent); }
  .pagechip .pagechip-check{ position:absolute; top:4px; left:4px; width:16px; height:16px; border-radius:4px; background:var(--accent); color:#fff; display:none; align-items:center; justify-content:center; }
  .pagechip.active .pagechip-check{ display:flex; }
  .pagechip-check svg{ width:10px; height:10px; }
  .pagechip-rotimg{ transition:transform .15s ease; }
  .pagechip-rotbtns{ display:flex; justify-content:center; gap:4px; margin-top:4px; }
  .pagechip-rotbtns button{ border:1px solid var(--line); background:var(--panel); border-radius:4px; width:20px; height:20px; font-size:10px; cursor:pointer; color:var(--ink-soft); line-height:1; }
  .pagechip-rotbtns button:hover{ border-color:var(--accent); color:var(--accent); }

  .pickerbar{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .pickerbar .hint{ font-size:11.5px; color:var(--ink-faint); }

  .wm-preview{ position:relative; display:inline-block; border:1px solid var(--line); border-radius:6px; overflow:hidden; margin-top:6px; max-width:100%; }
  .wm-preview img{ display:block; max-width:100%; }
  .wm-preview-text{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-45deg); white-space:nowrap; color:#808080; pointer-events:none; user-select:none; font-family:Arial,sans-serif; }

  .sliderrow{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .sliderrow label{ width:78px; flex:none; font-size:12px; color:var(--ink-soft); }
  .sliderrow input[type=range]{ flex:1; accent-color:var(--accent); }
  .sliderrow .val{ width:44px; flex:none; text-align:right; font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); }

  .pageeditor{ margin-top:14px; }
  .pageeditor-stage{ position:relative; display:inline-block; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .pageeditor-stage img{ display:block; max-width:100%; }
  .pageeditor-stage canvas{ position:absolute; top:0; left:0; max-width:100%; display:block; cursor:crosshair; }
  .pageeditor-tools{ display:flex; align-items:center; gap:10px; margin-top:8px; }

  .callout{ display:flex; gap:10px; padding:12px 14px; border-radius:8px; background:var(--warn-tint); border:1px solid color-mix(in srgb, var(--warn) 45%, transparent); font-size:12px; color:var(--ink); line-height:1.5; margin-bottom:16px; }
  .callout svg{ width:16px;height:16px; flex:none; color:var(--warn); margin-top:1px; }

  .actions{ display:flex; align-items:center; gap:10px; margin-top:4px; }
  .btn{ border:0; border-radius:7px; padding:10px 16px; font-size:12.5px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-ink); }
  .btn-primary:disabled{ background:var(--ink-faint); cursor:not-allowed; opacity:.6; }
  .btn-ghost{ background:transparent; border:1px solid var(--line); color:var(--ink-soft); }
  .btn-ghost:hover{ color:var(--ink); border-color:var(--ink-faint); }
  .btn-ghost:disabled{ opacity:.5; cursor:not-allowed; }
  .spinner{ width:13px;height:13px; border-radius:50%; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; animation:spin .7s linear infinite; display:none; }
  .btn-primary.loading .spinner{ display:inline-block; }
  .btn-primary.loading .btn-label{ display:none; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .success{ display:none; margin-top:16px; padding:14px; border-radius:8px; background:var(--good-tint); border:1px solid color-mix(in srgb, var(--good) 40%, transparent); }
  .success.show{ display:block; }
  .success .s1{ font-size:12.5px; font-weight:700; color:var(--good); display:flex; align-items:center; gap:7px; }
  .success .s1 svg{ width:14px;height:14px; }
  .success .path{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); margin-top:5px; word-break:break-all; }

  .error{ display:none; margin-top:16px; padding:14px; border-radius:8px; background:var(--warn-tint); border:1px solid color-mix(in srgb, var(--warn) 45%, transparent); font-size:12.5px; color:var(--ink); }
  .error.show{ display:block; }

  .filelist{ display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .filelist .row{ display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:7px; padding:8px 10px; background:var(--panel); font-size:12px; }
  .filelist .row .n{ font-family:var(--font-mono); color:var(--ink-faint); width:18px; }
  .filelist .row .nm{ flex:1; font-weight:600; }
  .filelist .row button{ border:0; background:none; color:var(--ink-faint); cursor:pointer; font-size:11px; }
  .filelist .row button:hover{ color:var(--accent); }

  .statusbar{ flex:none; display:flex; align-items:center; gap:16px; padding:7px 16px; border-top:1px solid var(--line); background:var(--cabinet); font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); }
  .statusbar .dot{ width:6px;height:6px;border-radius:50%; background:var(--good); box-shadow:0 0 0 3px color-mix(in srgb, var(--good) 22%, transparent); }
  .statusbar .net{ margin-left:auto; }
</style>
</head>

    {id:'pdf-to-excel', cat:'from-pdf', catLabel:'Convert from PDF', title:'PDF to Excel', desc:'Lift tables out of a PDF into an .xlsx workbook.', icon:ICONS.pdf2x, badge:BADGE.x, tint:'var(--pdf-tint)', kind:'pdf-to-excel', accept:'.pdf', out:'xlsx'},

    {id:'pdf-to-img', cat:'from-pdf', catLabel:'Convert from PDF', title:'PDF to Images', desc:'Export each page as a separate PNG.', icon:ICONS.pdf2img, badge:BADGE.img, tint:'var(--pdf-tint)', kind:'pdf-to-images', accept:'.pdf', out:'png'},

    {id:'compress', cat:'optimize', catLabel:'Optimize', title:'Compress PDF', desc:'Shrink file size by re-encoding images inside the PDF.', icon:ICONS.compress, tint:'var(--pdf-tint)', kind:'compress', accept:'.pdf', out:'pdf'},
    {id:'watermark', cat:'optimize', catLabel:'Optimize', title:'Add Watermark', desc:'Stamp text diagonally across every page.', icon:ICONS.watermark, tint:'var(--pdf-tint)', kind:'watermark', accept:'.pdf', out:'pdf'},

    {id:'redact', cat:'security', catLabel:'Security', title:'Redact PDF', desc:'Black out sensitive text, by hand or auto-detected.', icon:ICONS.redact, tint:'var(--pdf-tint)', kind:'redact', accept:'.pdf', out:'pdf'},
    {id:'password', cat:'security', catLabel:'Security', title:'Password Protect', desc:'Require a password before the PDF can be opened.', icon:ICONS.password, tint:'var(--pdf-tint)', kind:'password', accept:'.pdf', out:'pdf'}
  ];

  var CATS = [
    {key:'organize', label:'Organize', hint:'Reshuffle pages without changing content'},
    {key:'to-pdf', label:'Convert to PDF', hint:'Office documents become print-perfect PDFs'},
    {key:'from-pdf', label:'Convert from PDF', hint:'Pull editable files back out of a PDF'},
    {key:'optimize', label:'Optimize', hint:'Reduce size or mark up existing PDFs'},
    {key:'security', label:'Security', hint:'Redact and lock down sensitive files'}
  ];

  function fmtBytes(b){
    if(b < 1024) return b + ' B';
    if(b < 1024*1024) return (b/1024).toFixed(0) + ' KB';
    return (b/(1024*1024)).toFixed(1) + ' MB';
  }
  function baseName(name){ return name.replace(/\.[^.]+$/, ''); }

  function cardHtml(t){
    return '<button class="card" data-id="'+t.id+'" data-cat="'+t.cat+'" tabindex="0">'
      + iconHtml(t)
      + '<h3>'+t.title+'</h3><p>'+t.desc+'</p>'
      + '<div class="card-meta"><span class="dot"></span>Local</div>'
      + '</button>';
  }
  function renderHome(){
    var wrap = byId('grid');
    wrap.innerHTML = TOOLS.map(cardHtml).join('');
    wrap.querySelectorAll('.card').forEach(function(el){
      el.addEventListener('click', function(){ openWorkflow(el.getAttribute('data-id')); });
      el.addEventListener('keydown', function(e){ if(e.key==='Enter') openWorkflow(el.getAttribute('data-id')); });
    });
  }

  var currentCatFilter = 'all';
  function applyFilters(){
    var q = byId('searchInput').value.trim().toLowerCase();
    document.querySelectorAll('.card').forEach(function(card){
      var cat = card.getAttribute('data-cat');
      var text = card.textContent.toLowerCase();
      var catOk = (currentCatFilter==='all' || cat===currentCatFilter);
      var textOk = (!q || text.indexOf(q) > -1);
      card.style.display = (catOk && textOk) ? '' : 'none';
    });
  }
  function renderFilterBar(){
    var wrap = byId('filterbar');
    var html = '<button class="pill active" data-filter="all">All <span class="pill-count">'+TOOLS.length+'</span></button>';
    html += CATS.map(function(cat){
      var n = TOOLS.filter(function(t){ return t.cat===cat.key; }).length;
      return '<button class="pill" data-filter="'+cat.key+'" title="'+cat.hint+'">'+cat.label+' <span class="pill-count">'+n+'</span></button>';
    }).join('');
    wrap.innerHTML = html;
    wrap.querySelectorAll('.pill').forEach(function(btn){
      btn.addEventListener('click', function(){
        wrap.querySelectorAll('.pill').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        currentCatFilter = btn.getAttribute('data-filter');
        applyFilters();
        closeWorkflow();
      });
    });
  }
  byId('searchInput').addEventListener('input', applyFilters);

  function byToolId(id){ return TOOLS.filter(function(t){ return t.id===id; })[0]; }

  function openWorkflow(id){
    var t = byToolId(id);
    if(!t) return;
    byId('home').classList.add('hide');
    var wf = byId('workflow');
    wf.classList.add('show');
    wf.innerHTML = wfShell(t);
    initWorkflow(t);
  }
  function closeWorkflow(){
    byId('home').classList.remove('hide');
    byId('workflow').classList.remove('show');
    byId('workflow').innerHTML = '';
  }

  function actionLabel(t){
    if(t.kind==='compress') return 'Compress & Save As…';
    if(t.kind==='redact') return 'Redact & Save As…';
    if(t.kind==='password') return 'Protect & Save As…';
    if(t.kind==='merge') return 'Merge & Save As…';
    if(t.kind==='split') return 'Split & Choose Folder…';
    if(t.kind==='rotate') return 'Rotate & Save As…';
    if(t.kind==='remove') return 'Remove Pages & Save As…';
    if(t.kind==='watermark') return 'Add Watermark & Save As…';
    if(t.kind==='pdf-to-images') return 'Convert & Choose Folder…';
    if(t.kind==='office-to-pdf' || t.kind==='images-to-pdf') return 'Convert to PDF…';
    return 'Convert & Save As…';
  }

  function wfShell(t){
    return '<button class="back" id="wfBack"><svg viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> All tools</button>'
      + '<div class="wf-head">' + iconHtml(t)
      + '<div><div class="crumb">'+t.catLabel+'</div><h1>'+t.title+'</h1></div></div>'
      + '<div id="wfBody"></div>'
      + '<div class="actions"><button class="btn btn-primary" id="wfGo" disabled><span class="spinner"></span><span class="btn-label">'+actionLabel(t)+'</span></button></div>'
      + '<div class="success" id="wfSuccess"></div>'
      + '<div class="error" id="wfError"></div>';
  }

  function fileRowHtml(t, f){
    return '<div class="filecard" id="wfFile">' + iconHtml(t)
      + '<div><div class="fname">'+f.name+'</div><div class="fsize">'+fmtBytes(f.size)+'</div></div>'
      + '<button class="clear" id="wfClear">Remove</button></div>';
  }
  function dropzoneHtml(t, label){
    return '<div class="dropzone" id="wfDrop" tabindex="0">'
      + '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12M7 10l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>'
      + '<div><div class="dz-title">'+(label || ('Click to choose a '+t.accept.split(',')[0]+' file'))+'</div><div class="dz-sub">Stays on this PC the entire time</div></div>'
      + '</div>';
  }

  var MATCH_LABELS = {
    pan:'PAN number', aadhaar:'Aadhaar number', bank:'Bank account number',
    email:'Email address', phone:'Phone number'
  };

  // ---------------------------------------------------------------------
  // per-tool workflow bodies
  // ---------------------------------------------------------------------
  function initWorkflow(t){
    byId('wfBack').addEventListener('click', closeWorkflow);
    var goBtn = byId('wfGo');
    var body = byId('wfBody');
    var file = null;        // {path,name,size}
    var files = [];         // for merge / images-to-pdf

    function showError(msg){
      var e = byId('wfError');
      e.textContent = msg;
      e.classList.add('show');
    }
    function clearError(){ byId('wfError').classList.remove('show'); byId('wfError').textContent=''; }
    function showSuccess(html){
      var s = byId('wfSuccess');
      s.innerHTML = html;
      s.classList.add('show');
    }
    function runGuarded(fn){
      clearError();
      goBtn.classList.add('loading');
      goBtn.disabled = true;
      Promise.resolve().then(fn).catch(function(err){
        showError((err && err.message) ? err.message : String(err));
      }).finally(function(){
        goBtn.classList.remove('loading');
        goBtn.disabled = false;
      });
    }
    function successBlock(savedPath, detail){
      return '<div class="s1"><svg viewBox="0 0 20 20" fill="none"><path d="M4 10.5l4 4L16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Saved</div>'
        + '<div class="path">'+savedPath+(detail ? '  ('+detail+')' : '')+'</div>';
    }

    // Shared setup for every "one file in, options, one file out" workflow:
    // renders the dropzone/file-row into #wfFileSlot, wires the Remove button
    // to actually clear the file (not just look clickable), and shows/hides
    // an optional options panel once a file is chosen.
    function setupSingleFile(optionsBoxIds, onSelected){
      function render(){
        var slot = byId('wfFileSlot');
        if(file){
          slot.innerHTML = fileRowHtml(t, file);
          byId('wfClear').addEventListener('click', function(){
            file = null;
            goBtn.disabled = true;
            (optionsBoxIds||[]).forEach(function(id){ byId(id).style.display = 'none'; });
            render();
          });
        } else {
          slot.innerHTML = dropzoneHtml(t);
          wireSingleFileDrop(t, function(f){
            file = f;
            goBtn.disabled = false;
            (optionsBoxIds||[]).forEach(function(id){ byId(id).style.display = ''; });
            render();
            if(onSelected) onSelected();
          });
        }
      }
      render();
    }

    // ---- single-file kinds (office-to-pdf, pdf-to-word, pdf-to-ppt) ----
    if(['office-to-pdf','pdf-to-word','pdf-to-ppt'].indexOf(t.kind) > -1){
      body.innerHTML = '<div id="wfFileSlot"></div>';
      setupSingleFile([]);

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        api().pick_save_path(baseName(file.name) + '.' + t.out).then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            var call = t.kind==='office-to-pdf' ? api()[t.api](file.path, savePath)
              : t.kind==='pdf-to-word' ? api().pdf_to_word(file.path, savePath)
              : api().pdf_to_ppt(file.path, savePath);
            return call.then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      return;
    }

    // ---- pdf-to-excel (single file, reports table count) ----
    if(t.kind === 'pdf-to-excel'){
      body.innerHTML = '<div id="wfFileSlot"></div>';
      setupSingleFile([]);
      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        api().pick_save_path(baseName(file.name) + '.xlsx').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().pdf_to_excel(file.path, savePath).then(function(res){
              var detail = res.tables_found + (res.tables_found===1 ? ' table found' : ' tables found');
              showSuccess(successBlock(savePath, detail));
            });
          });
        });
      });
      return;
    }

    // ---- pdf-to-images (single file, folder output) ----
    if(t.kind === 'pdf-to-images'){
      body.innerHTML = '<div id="wfFileSlot"></div>';
      setupSingleFile([]);
      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        api().pick_save_dir().then(function(dir){
          if(!dir) return;
          runGuarded(function(){
            return api().pdf_to_images(file.path, dir).then(function(res){
              showSuccess(successBlock(dir, res.outputs.length + ' images'));
            });
          });
        });
      });
      return;
    }

    // ---- images-to-pdf / merge (multi file) ----
    if(t.kind === 'images-to-pdf' || t.kind === 'merge'){
      renderFileList();
      goBtn.addEventListener('click', function(){
        if(files.length < (t.kind==='merge' ? 2 : 1)) {
          showError(t.kind==='merge' ? 'Add at least two PDFs to merge.' : 'Add at least one image.');
          return;
        }
        var suggested = t.kind==='merge' ? 'merged.pdf' : (baseName(files[0].name) + '.pdf');
        api().pick_save_path(suggested).then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            var paths = files.map(function(f){ return f.path; });
            var call = t.kind==='merge' ? api().merge(paths, savePath) : api().images_to_pdf(paths, savePath);
            return call.then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      function renderFileList(){
        var rows = files.map(function(f, i){
          return '<div class="row"><span class="n">'+(i+1)+'</span><span class="nm">'+f.name+'</span><span class="fsize">'+fmtBytes(f.size)+'</span><button data-i="'+i+'">Remove</button></div>';
        }).join('');
        var dzLabel = files.length ? 'Drop more files, or click to browse' : (t.kind==='merge' ? 'Drop PDFs here, or click to choose' : 'Drop images here, or click to choose');
        body.innerHTML = (files.length ? '<div class="filelist">'+rows+'</div>' : '') + dropzoneHtml(t, dzLabel);
        body.querySelectorAll('.filelist button').forEach(function(btn){
          btn.addEventListener('click', function(){
            files.splice(parseInt(btn.getAttribute('data-i'),10), 1);
            goBtn.disabled = files.length < (t.kind==='merge' ? 2 : 1);
            renderFileList();
          });
        });
        wireMultiFileDrop(byId('wfDrop'), t.accept, function(picked){
          files = files.concat(picked);
          goBtn.disabled = files.length < (t.kind==='merge' ? 2 : 1);
          renderFileList();
        });
      }
      return;
    }

    // ---- rotate (whole-document presets, or each page on its own) ----
    if(t.kind === 'rotate'){
      var rotations = {};   // pageNum -> current degrees (0/90/180/270)
      var pageCount = 0;

      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="rotBox"><h4>Rotate</h4>'
        + '<div class="pickerbar"><span class="hint">Rotate every page:</span>'
        + '<button class="btn btn-ghost" type="button" id="rotAllLeft">&#8634; 90&deg;</button>'
        + '<button class="btn btn-ghost" type="button" id="rotAllRight">&#8635; 90&deg;</button>'
        + '<button class="btn btn-ghost" type="button" id="rotAll180">180&deg;</button>'
        + '</div>'
        + '<div class="hint" style="margin-bottom:10px">Or use the &#8634;/&#8635; buttons on any page below to rotate just that one.</div>'
        + '<div class="pagestrip" id="rotStrip"></div></div>';

      function applyDelta(pageNum, delta){
        var cur = rotations[pageNum] || 0;
        rotations[pageNum] = ((cur + delta) % 360 + 360) % 360;
        var img = byId('rotStrip').querySelector('.pagechip[data-page="'+pageNum+'"] img');
        if(img) img.style.transform = 'rotate(' + rotations[pageNum] + 'deg)';
      }
      function applyAllDelta(delta){
        for(var p = 1; p <= pageCount; p++) applyDelta(p, delta);
      }
      byId('rotAllLeft').addEventListener('click', function(){ applyAllDelta(-90); });
      byId('rotAllRight').addEventListener('click', function(){ applyAllDelta(90); });
      byId('rotAll180').addEventListener('click', function(){ applyAllDelta(180); });

      setupSingleFile(['rotBox'], function(){
        rotations = {};
        api().page_count(file.path).then(function(n){
          pageCount = n;
          renderPageThumbs(byId('rotStrip'), file.path, n, function(pageNum, img, chip){
            img.style.transform = 'rotate(' + (rotations[pageNum] || 0) + 'deg)';
            var btnRow = document.createElement('div');
            btnRow.className = 'pagechip-rotbtns';
            btnRow.innerHTML = '<button type="button" data-d="-90" title="Rotate left">&#8634;</button><button type="button" data-d="90" title="Rotate right">&#8635;</button>';
            chip.appendChild(btnRow);
            btnRow.querySelectorAll('button').forEach(function(b){
              b.addEventListener('click', function(e){
                e.stopPropagation();
                applyDelta(pageNum, parseInt(b.getAttribute('data-d'), 10));
              });
            });
          });
        });
      });

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        var toApply = {};
        Object.keys(rotations).forEach(function(p){ if(rotations[p] % 360 !== 0) toApply[p] = rotations[p]; });
        if(!Object.keys(toApply).length){ showError('Rotate at least one page first.'); return; }
        api().pick_save_path(baseName(file.name) + '-rotated.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().rotate(file.path, savePath, toApply).then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      return;
    }

    // ---- remove pages (tick thumbnails, or type page numbers, kept in sync) ----
    if(t.kind === 'remove'){
      var toRemove = new Set();

      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="remBox"><h4>Pages to remove</h4>'
        + '<div class="field"><input type="text" id="remInput" placeholder="e.g. 2, 4, 7"><div class="hint">Type page numbers, or click their thumbnails below to tick them.</div></div>'
        + '<div class="pagestrip" id="remStrip" style="margin-top:10px"></div></div>';

      function refreshRemChips(){
        byId('remStrip').querySelectorAll('.pagechip').forEach(function(chip){
          chip.classList.toggle('active', toRemove.has(parseInt(chip.dataset.page, 10)));
        });
      }
      byId('remInput').addEventListener('input', function(){
        toRemove = new Set((byId('remInput').value.match(/\d+/g) || []).map(Number));
        refreshRemChips();
      });

      setupSingleFile(['remBox'], function(){
        toRemove = new Set();
        byId('remInput').value = '';
        api().page_count(file.path).then(function(n){
          renderPageThumbs(byId('remStrip'), file.path, n);
          byId('remStrip').querySelectorAll('.pagechip').forEach(function(chip){
            chip.addEventListener('click', function(){
              var p = parseInt(chip.dataset.page, 10);
              if(toRemove.has(p)) toRemove.delete(p); else toRemove.add(p);
              chip.classList.toggle('active');
              byId('remInput').value = Array.from(toRemove).sort(function(a,b){ return a-b; }).join(', ');
            });
          });
        });
      });

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        if(!toRemove.size){ showError('Tick at least one page to remove.'); return; }
        api().pick_save_path(baseName(file.name) + '-edited.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().remove_pages(file.path, Array.from(toRemove), savePath).then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      return;
    }

    // ---- split (type a range, click thumbnails, or both, stays in sync) ----
    if(t.kind === 'split'){
      var picked = new Set();

      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="splitBox"><h4>Pages to extract</h4>'
        + '<div class="field"><input type="text" id="rangeInput" placeholder="e.g. 1-3, 5"><div class="hint">Type a range, or click pages below. Leave blank to split into one file per page.</div></div>'
        + '<div class="pagestrip" id="splitStrip" style="margin-top:10px"></div>'
        + '<label class="checkrow" style="margin-top:12px"><input type="checkbox" id="mergeCheck"> Combine the extracted pages into one PDF file</label>'
        + '<div class="hint" id="splitInfo"></div></div>';

      function refreshSplitChips(){
        byId('splitStrip').querySelectorAll('.pagechip').forEach(function(chip){
          chip.classList.toggle('active', picked.has(parseInt(chip.dataset.page, 10)));
        });
      }
      function updateSplitInfo(){
        var ranges = pagesToRanges(picked);
        var merge = byId('mergeCheck').checked;
        var n = picked.size === 0 ? 0 : (merge ? 1 : ranges.length);
        byId('splitInfo').textContent = picked.size === 0
          ? 'Nothing selected: every page becomes its own file.'
          : (n + (n === 1 ? ' PDF will be created.' : ' PDFs will be created.'));
      }
      byId('rangeInput').addEventListener('input', function(){
        picked = new Set();
        parseRangeString(byId('rangeInput').value).forEach(function(r){
          for(var p = r[0]; p <= r[1]; p++) picked.add(p);
        });
        refreshSplitChips();
        updateSplitInfo();
      });
      byId('mergeCheck').addEventListener('change', updateSplitInfo);

      setupSingleFile(['splitBox'], function(){
        picked = new Set();
        byId('rangeInput').value = '';
        updateSplitInfo();
        api().page_count(file.path).then(function(n){
          renderPageThumbs(byId('splitStrip'), file.path, n);
          byId('splitStrip').querySelectorAll('.pagechip').forEach(function(chip){
            chip.addEventListener('click', function(){
              var p = parseInt(chip.dataset.page, 10);
              if(picked.has(p)) picked.delete(p); else picked.add(p);
              chip.classList.toggle('active');
              byId('rangeInput').value = rangesToString(pagesToRanges(picked));
              updateSplitInfo();
            });
          });
        });
      });

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        var ranges = picked.size ? pagesToRanges(picked) : null;
        var merge = picked.size > 0 && byId('mergeCheck').checked;
        api().pick_save_dir().then(function(dir){
          if(!dir) return;
          runGuarded(function(){
            return api().split(file.path, dir, ranges, merge).then(function(res){
              showSuccess(successBlock(dir, res.outputs.length + (res.outputs.length === 1 ? ' file' : ' files')));
            });
          });
        });
      });
      return;
    }

    // ---- compress ----
    if(t.kind === 'compress'){
      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="cmpBox"><h4>Compression level</h4>'
        + '<div class="segmented" id="cmpSeg">'
        + '<div class="seg" data-lvl="low"><div class="t1">Low</div><div class="t2">Best quality</div></div>'
        + '<div class="seg active" data-lvl="recommended"><div class="t1">Recommended</div><div class="t2">Balanced</div></div>'
        + '<div class="seg" data-lvl="extreme"><div class="t1">Extreme</div><div class="t2">Smallest file</div></div>'
        + '<div class="seg" data-lvl="custom"><div class="t1">Custom %</div><div class="t2">Pick a target</div></div>'
        + '</div>'
        + '<div class="field" id="cmpCustomField" style="display:none; margin-top:12px;">'
        + '<label>Target size reduction</label>'
        + '<div class="sliderrow"><input type="range" id="cmpPct" min="10" max="95" value="70"><span class="val" id="cmpPctVal">70%</span></div>'
        + '<div class="hint">Compresses toward this target, but stops short and explains why if going further would risk making text hard to read.</div>'
        + '</div></div>';
      var level = 'recommended';
      byId('cmpSeg').querySelectorAll('.seg').forEach(function(seg){
        seg.addEventListener('click', function(){
          byId('cmpSeg').querySelectorAll('.seg').forEach(function(s){ s.classList.remove('active'); });
          seg.classList.add('active');
          level = seg.getAttribute('data-lvl');
          byId('cmpCustomField').style.display = (level === 'custom') ? '' : 'none';
        });
      });
      byId('cmpPct').addEventListener('input', function(){ byId('cmpPctVal').textContent = byId('cmpPct').value + '%'; });
      setupSingleFile(['cmpBox']);
      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        api().pick_save_path(baseName(file.name) + '-compressed.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            if(level === 'custom'){
              var targetPct = parseInt(byId('cmpPct').value, 10);
              return api().compress_custom(file.path, targetPct, savePath).then(function(res){
                var achieved = Math.round(res.achieved_pct);
                var detail = fmtBytes(res.before_bytes)+' → '+fmtBytes(res.after_bytes)+' ('+achieved+'% smaller, requested '+targetPct+'%)';
                showSuccess(successBlock(savePath, detail) + (res.reason ? '<div style="margin-top:8px; font-size:11px; color:var(--ink-faint)">'+res.reason+'</div>' : ''));
              });
            }
            return api().compress(file.path, level, savePath).then(function(res){
              var pct = Math.round(100 * (1 - res.after_bytes / res.before_bytes));
              showSuccess(successBlock(savePath, fmtBytes(res.before_bytes)+' → '+fmtBytes(res.after_bytes)+' ('+pct+'% smaller)'));
            });
          });
        });
      });
      return;
    }

    // ---- watermark (adjustable size/opacity, live preview, every page) ----
    if(t.kind === 'watermark'){
      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="wmBox"><h4>Watermark</h4>'
        + '<div class="field"><input type="text" id="wmInput" placeholder="e.g. DRAFT or CONFIDENTIAL" value="CONFIDENTIAL"></div>'
        + '<div class="sliderrow"><label>Font size</label><input type="range" id="wmSize" min="12" max="120" value="48"><span class="val" id="wmSizeVal">48pt</span></div>'
        + '<div class="sliderrow"><label>Opacity</label><input type="range" id="wmOpacity" min="5" max="80" value="25"><span class="val" id="wmOpacityVal">25%</span></div>'
        + '<div class="hint" style="margin-bottom:6px">Preview (applies the same way to every page):</div>'
        + '<div class="wm-preview" id="wmPreview"></div></div>';

      function updatePreview(){
        var textEl = byId('wmPreviewText');
        if(!textEl) return;
        var scale = parseFloat(byId('wmPreview').getAttribute('data-scale') || '1');
        var size = parseInt(byId('wmSize').value, 10);
        var opacity = parseInt(byId('wmOpacity').value, 10) / 100;
        textEl.textContent = byId('wmInput').value.trim() || 'CONFIDENTIAL';
        textEl.style.fontSize = (size * scale) + 'px';
        textEl.style.opacity = opacity;
      }
      byId('wmInput').addEventListener('input', updatePreview);
      byId('wmSize').addEventListener('input', function(){ byId('wmSizeVal').textContent = byId('wmSize').value + 'pt'; updatePreview(); });
      byId('wmOpacity').addEventListener('input', function(){ byId('wmOpacityVal').textContent = byId('wmOpacity').value + '%'; updatePreview(); });

      setupSingleFile(['wmBox'], function(){
        api().render_page_preview(file.path, 1, 520).then(function(r){
          var wrap = byId('wmPreview');
          wrap.setAttribute('data-scale', r.scale);
          wrap.innerHTML = '<img src="data:image/png;base64,' + r.image_b64 + '"><div class="wm-preview-text" id="wmPreviewText"></div>';
          updatePreview();
        });
      });

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        var text = byId('wmInput').value.trim() || 'CONFIDENTIAL';
        var fontSize = parseInt(byId('wmSize').value, 10);
        var opacity = parseInt(byId('wmOpacity').value, 10) / 100;
        api().pick_save_path(baseName(file.name) + '-watermarked.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().watermark(file.path, text, savePath, opacity, fontSize).then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      return;
    }

    // ---- password ----
    if(t.kind === 'password'){
      body.innerHTML = '<div id="wfFileSlot"></div><div class="panel-box" style="display:none" id="pwBox"><h4>Set password</h4>'
        + '<div class="field"><label>Password</label><div class="pwrow"><input type="password" id="pwOne"><button class="pw-toggle" data-for="pwOne" type="button">Show</button></div></div>'
        + '<div class="field"><label>Confirm</label><div class="pwrow"><input type="password" id="pwTwo"><button class="pw-toggle" data-for="pwTwo" type="button">Show</button></div></div>'
        + '<div class="hint" id="pwHint">Anyone opening this PDF will need this password.</div></div>';
      body.querySelectorAll('.pw-toggle').forEach(function(btn){
        btn.addEventListener('click', function(){
          var inp = byId(btn.getAttribute('data-for'));
          var showing = inp.type === 'text';
          inp.type = showing ? 'password' : 'text';
          btn.textContent = showing ? 'Show' : 'Hide';
        });
      });
      setupSingleFile(['pwBox']);
      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        var p1 = byId('pwOne').value, p2 = byId('pwTwo').value;
        var hint = byId('pwHint');
        if(!p1){ hint.textContent = 'Enter a password.'; hint.style.color = 'var(--warn)'; return; }
        if(p1 !== p2){ hint.textContent = 'Passwords don’t match.'; hint.style.color = 'var(--warn)'; return; }
        hint.textContent = 'Anyone opening this PDF will need this password.'; hint.style.color = 'var(--ink-faint)';
        api().pick_save_path(baseName(file.name) + '-protected.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().protect(file.path, p1, savePath).then(function(){ showSuccess(successBlock(savePath)); });
          });
        });
      });
      return;
    }

    // ---- redact (auto-detect + manual canvas) ----
    if(t.kind === 'redact'){
      var manualBoxes = []; // {page, rect:[x0,y0,x1,y1]}
      var autoMatches = []; // scan_sensitive() results
      body.innerHTML = '<div id="wfFileSlot"></div>'
        + '<div class="panel-box" style="display:none" id="scanBox"><h4>Auto-detect sensitive data</h4>'
        + '<label class="checkrow"><input type="checkbox" checked data-pattern="pan"> PAN number <span class="hintmono">ABCDE1234F</span></label>'
        + '<label class="checkrow"><input type="checkbox" checked data-pattern="aadhaar"> Aadhaar number <span class="hintmono">XXXX XXXX XXXX</span></label>'
        + '<label class="checkrow"><input type="checkbox" checked data-pattern="bank"> Bank account number</label>'
        + '<label class="checkrow"><input type="checkbox" data-pattern="email"> Email address</label>'
        + '<label class="checkrow"><input type="checkbox" data-pattern="phone"> Phone number</label>'
        + '<button class="btn btn-ghost" id="wfScan">Scan for matches</button>'
        + '<div id="wfMatches"></div></div>'
        + '<div class="panel-box" style="display:none" id="manualBox"><h4>Manual redaction</h4>'
        + '<div class="pagestrip" id="pagestrip"></div>'
        + '<div class="pageeditor" id="pageeditor"></div></div>';

      setupSingleFile(['scanBox', 'manualBox'], function(){
        manualBoxes = []; autoMatches = [];
        byId('wfMatches').innerHTML = '';
        loadPageStrip();
      });

      function loadPageStrip(){
        api().page_count(file.path).then(function(n){
          var strip = byId('pagestrip');
          strip.innerHTML = '';
          for(var i=1;i<=n;i++){
            (function(pageNum){
              var chip = document.createElement('button');
              chip.className = 'pagechip';
              chip.innerHTML = '<span>Page '+pageNum+'</span>';
              chip.addEventListener('click', function(){
                strip.querySelectorAll('.pagechip').forEach(function(c){ c.classList.remove('active'); });
                chip.classList.add('active');
                openPageEditor(pageNum);
              });
              strip.appendChild(chip);
              api().render_page_preview(file.path, pageNum).then(function(r){
                var img = document.createElement('img');
                img.src = 'data:image/png;base64,' + r.image_b64;
                chip.insertBefore(img, chip.firstChild);
              });
            })(i);
          }
        });
      }

      function openPageEditor(pageNum){
        var ed = byId('pageeditor');
        ed.innerHTML = 'Loading page…';
        api().render_page_preview(file.path, pageNum, 640).then(function(r){
          ed.innerHTML = '<div class="pageeditor-stage"><img id="peImg" src="data:image/png;base64,'+r.image_b64+'"><canvas id="peCanvas" width="'+r.width+'" height="'+r.height+'"></canvas></div>'
            + '<div class="pageeditor-tools"><span class="hint">Click and drag to black out an area. Boxes apply when you redact.</span> <button class="btn btn-ghost" id="peClear">Clear this page</button></div>';
          var canvas = byId('peCanvas');
          var ctx = canvas.getContext('2d');
          redrawManual(pageNum, ctx);
          var drawing = null;
          canvas.addEventListener('mousedown', function(e){
            var rect = canvas.getBoundingClientRect();
            var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            drawing = {x0:(e.clientX-rect.left)*scaleX, y0:(e.clientY-rect.top)*scaleY};
          });
          canvas.addEventListener('mousemove', function(e){
            if(!drawing) return;
            var rect = canvas.getBoundingClientRect();
            var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            var x1 = (e.clientX-rect.left)*scaleX, y1 = (e.clientY-rect.top)*scaleY;
            redrawManual(pageNum, ctx);
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(Math.min(drawing.x0,x1), Math.min(drawing.y0,y1), Math.abs(x1-drawing.x0), Math.abs(y1-drawing.y0));
          });
          window.addEventListener('mouseup', function up(e){
            if(!drawing) return;
            var rect = canvas.getBoundingClientRect();
            var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            var x1 = (e.clientX-rect.left)*scaleX, y1 = (e.clientY-rect.top)*scaleY;
            var x0=Math.min(drawing.x0,x1), y0=Math.min(drawing.y0,y1);
            var w=Math.abs(x1-drawing.x0), h=Math.abs(y1-drawing.y0);
            drawing = null;
            if(w > 4 && h > 4){
              manualBoxes.push({page: pageNum, rect: [x0/r.scale, y0/r.scale, (x0+w)/r.scale, (y0+h)/r.scale]});
              redrawManual(pageNum, ctx);
            }
          });
          byId('peClear').addEventListener('click', function(){
            manualBoxes = manualBoxes.filter(function(b){ return b.page !== pageNum; });
            redrawManual(pageNum, ctx);
          });
          function redrawManual(pageNum, ctx){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            manualBoxes.filter(function(b){ return b.page===pageNum; }).forEach(function(b){
              var x0=b.rect[0]*r.scale, y0=b.rect[1]*r.scale, x1=b.rect[2]*r.scale, y1=b.rect[3]*r.scale;
              ctx.fillRect(x0,y0,x1-x0,y1-y0);
            });
          }
        });
      }

      byId('wfScan').addEventListener('click', function(){
        var keys = Array.prototype.slice.call(document.querySelectorAll('[data-pattern]:checked')).map(function(cb){ return cb.getAttribute('data-pattern'); });
        if(!keys.length){ byId('wfMatches').innerHTML = '<div class="hint">Select at least one pattern type.</div>'; return; }
        api().scan_sensitive(file.path, keys).then(function(matches){
          autoMatches = matches;
          byId('wfMatches').innerHTML = matches.length
            ? '<div class="matchlist">' + matches.map(function(m,i){
                return '<label class="matchrow"><input type="checkbox" checked data-idx="'+i+'"><span class="m-label">'+MATCH_LABELS[m.type]+'</span><span class="m-sample">'+m.text+'</span><span class="m-page">Page '+m.page+'</span></label>';
              }).join('') + '</div>'
            : '<div class="hint">No matches found.</div>';
        });
      });

      goBtn.addEventListener('click', function(){
        if(!file){ showError('Choose a file first.'); return; }
        var checkedIdx = Array.prototype.slice.call(document.querySelectorAll('#wfMatches [data-idx]:checked')).map(function(cb){ return parseInt(cb.getAttribute('data-idx'),10); });
        var boxes = checkedIdx.map(function(i){ return {page: autoMatches[i].page, rect: autoMatches[i].rect}; }).concat(manualBoxes);
        if(!boxes.length){ showError('Scan for matches or draw at least one manual box first.'); return; }
        api().pick_save_path(baseName(file.name) + '-redacted.pdf').then(function(savePath){
          if(!savePath) return;
          runGuarded(function(){
            return api().redact(file.path, boxes, savePath).then(function(){ showSuccess(successBlock(savePath, boxes.length + ' areas redacted')); });
          });
        });
      });
      return;
    }
  }

  // Dropped files can't reliably expose a real filesystem path from the
  // browser side across every pywebview/OS combination, so drag-and-drop
  // ships the actual bytes to Python over the same bridge every other
  // action already uses (Api.receive_dropped_file), instead of guessing at
  // a path. readAsDataURL is the browser's own (fast, native) base64 path.
  function fileToBase64(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){ resolve(reader.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function wireSingleFileDrop(t, onFile){
    var drop = byId('wfDrop');
    if(!drop) return;
    drop.addEventListener('click', function(){
      api().pick_open_file(t.accept).then(function(f){ if(f) onFile(f); });
    });
    drop.addEventListener('keydown', function(e){ if(e.key==='Enter') drop.click(); });
    ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add('drag'); }); });
    ['dragleave'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove('drag'); }); });
    drop.addEventListener('drop', function(e){
      e.preventDefault();
      drop.classList.remove('drag');
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if(!f) return;
      fileToBase64(f).then(function(b64){ return api().receive_dropped_file(f.name, b64); }).then(onFile);
    });
  }

  function wireMultiFileDrop(drop, accept, onFiles){
    drop.addEventListener('click', function(){
      api().pick_open_files(accept).then(function(picked){ if(picked && picked.length) onFiles(picked); });
    });
    drop.addEventListener('keydown', function(e){ if(e.key==='Enter') drop.click(); });
    ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add('drag'); }); });
    ['dragleave'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove('drag'); }); });
    drop.addEventListener('drop', function(e){
      e.preventDefault();
      drop.classList.remove('drag');
      var list = e.dataTransfer.files;
      if(!list || !list.length) return;
      Promise.all(Array.prototype.map.call(list, function(f){
        return fileToBase64(f).then(function(b64){ return api().receive_dropped_file(f.name, b64); });
      })).then(onFiles);
    });
  }

  // Shared thumbnail grid used by Split, Rotate, and Remove Pages. Chips
  // render immediately; each page's image streams in async. onImgLoaded
  // lets a caller apply its own per-page state (e.g. Rotate's live CSS
  // rotation) right as each thumbnail lands, and add extra controls to
  // the chip (e.g. Rotate's per-page buttons).
  function renderPageThumbs(container, filePath, pageCount, onImgLoaded){
    container.innerHTML = '';
    for(var i=1;i<=pageCount;i++){
      (function(pageNum){
        var chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'pagechip';
        chip.dataset.page = pageNum;
        chip.innerHTML = '<span class="pagechip-check"><svg viewBox="0 0 20 20" fill="none"><path d="M4 10.5l4 4L16 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Page '+pageNum+'</span>';
        container.appendChild(chip);
        api().render_page_preview(filePath, pageNum).then(function(r){
          var img = document.createElement('img');
          img.className = 'pagechip-rotimg';
          img.src = 'data:image/png;base64,' + r.image_b64;
          chip.insertBefore(img, chip.firstChild);
          if(onImgLoaded) onImgLoaded(pageNum, img, chip);
        });
      })(i);
    }
  }

  // Collapses a set of page numbers into 1-indexed inclusive [start,end]
  // ranges, e.g. {1,2,3,7} -> [[1,3],[7,7]]. Used so clicking three
  // consecutive thumbnails behaves identically to typing "1-3".
  function pagesToRanges(pageSet){
    var pages = Array.from(pageSet).sort(function(a,b){ return a-b; });
    var ranges = [], start = null, prev = null;
    pages.forEach(function(p){
      if(start === null){ start = p; prev = p; return; }
      if(p === prev + 1){ prev = p; return; }
      ranges.push([start, prev]);
      start = p; prev = p;
    });
    if(start !== null) ranges.push([start, prev]);
    return ranges;
  }
  function rangesToString(ranges){
    return ranges.map(function(r){ return r[0]===r[1] ? ''+r[0] : r[0]+'-'+r[1]; }).join(', ');
  }
  function parseRangeString(str){
    var out = [];
    (str||'').split(',').forEach(function(part){
      part = part.trim();
      var m = part.match(/^(\d+)\s*-\s*(\d+)$/);
      if(m) out.push([parseInt(m[1],10), parseInt(m[2],10)]);
      else if(/^\d+$/.test(part)) out.push([parseInt(part,10), parseInt(part,10)]);
    });
    return out;
  }

  renderFilterBar();
  renderHome();
})();
</script>
