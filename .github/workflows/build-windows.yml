name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tesseract OCR (for scanned PDF to Excel)
        run: |
          choco install tesseract --no-progress -y
          # Stage just the files we bundle: the exe, its DLLs, and English data.
          $src = "C:\Program Files\Tesseract-OCR"
          New-Item -ItemType Directory -Force -Path tessbundle\tessdata | Out-Null
          Copy-Item "$src\*.exe" tessbundle\ -Force
          Copy-Item "$src\*.dll" tessbundle\ -Force
          Copy-Item "$src\tessdata\eng.traineddata" tessbundle\tessdata\ -Force
          Copy-Item "$src\tessdata\osd.traineddata" tessbundle\tessdata\ -Force

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "PJS Pdf Studio" --add-data "ui;ui" `
            --add-data "tessbundle;tesseract" `
            --collect-all pdfminer `
            --hidden-import win32timezone `
            --collect-all winocr `
            --collect-all winsdk `
            main.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: PJS-Pdf-Studio-windows
          path: dist/PJS Pdf Studio.exe
          retention-days: 30
